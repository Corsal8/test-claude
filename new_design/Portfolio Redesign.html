<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Name — Full-Stack / Cloud Architect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
    <script type="text/babel" src="tweaks-panel.jsx"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--fg);
        overflow-x: hidden;
        transition:
          background 0.3s,
          color 0.3s;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
        opacity: 0.025;
      }
      :root {
        --accent: oklch(70% 0.19 52);
        --bg: oklch(12% 0.025 245);
        --bg-muted: oklch(16% 0.025 245);
        --fg: oklch(95% 0.006 240);
        --fg-muted: oklch(55% 0.012 240);
        --border: oklch(22% 0.03 245);
        --border-strong: oklch(30% 0.04 245);
        --icon-filter: brightness(0) invert(1) opacity(0.45);
      }
      :root.light {
        --bg: oklch(97% 0.006 240);
        --bg-muted: oklch(93% 0.008 240);
        --fg: oklch(12% 0.025 245);
        --fg-muted: oklch(45% 0.015 245);
        --border: oklch(85% 0.01 240);
        --border-strong: oklch(75% 0.015 240);
        --icon-filter: brightness(0) opacity(0.4);
      }
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-strong);
        border-radius: 2px;
      }

      /* ── Scroll reveal ── */
      [data-reveal] {
        opacity: 0;
        transform: translateY(22px);
        transition:
          opacity 0.65s ease,
          transform 0.65s ease;
      }
      [data-reveal].is-visible {
        opacity: 1;
        transform: none;
      }
      [data-reveal-delay="1"] {
        transition-delay: 0.1s;
      }
      [data-reveal-delay="2"] {
        transition-delay: 0.2s;
      }
      [data-reveal-delay="3"] {
        transition-delay: 0.32s;
      }

      /* ── Hero entry (no observer, immediate) ── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
      @keyframes ticker {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-50%);
        }
      }
      .fade-up {
        animation: fadeUp 0.7s ease both;
      }
      .delay-1 {
        animation-delay: 0.12s;
      }
      .delay-2 {
        animation-delay: 0.25s;
      }

      /* ── Utility ── */
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 2.5rem;
      }
      .section {
        padding: 7rem 0;
      }

      .label {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.7rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--fg-muted);
      }
      .rule-accent {
        height: 1px;
        background: var(--accent);
        width: 3rem;
      }

      /* ── Navbar ── */
      nav {
        position: fixed;
        left: 0;
        right: 0;
        top: 0;
        z-index: 100;
        background: color-mix(in oklch, var(--bg) 82%, transparent);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--border);
        transition: background 0.3s;
      }
      nav.scrolled {
        background: color-mix(in oklch, var(--bg) 96%, transparent);
      }
      .nav-inner {
        width: 100%;
        padding: 0 2.5rem;
        display: flex;
        align-items: center;
        height: 64px;
      }
      .nav-spacer {
        flex: 1;
      }
      .nav-logo {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 800;
        font-size: 1.05rem;
        color: var(--accent);
        text-decoration: none;
        letter-spacing: -0.02em;
        white-space: nowrap;
        margin-right: 3rem;
        flex-shrink: 0;
      }
      .nav-links {
        display: flex;
        gap: 2.5rem;
        list-style: none;
      }
      .nav-links a {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.7rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--fg-muted);
        text-decoration: none;
        transition: color 0.2s;
        position: relative;
      }
      .nav-links a::after {
        content: "";
        position: absolute;
        bottom: -3px;
        left: 0;
        right: 0;
        height: 1px;
        background: var(--accent);
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.25s ease;
      }
      .nav-links a:hover {
        color: var(--fg);
      }
      .nav-links a:hover::after {
        transform: scaleX(1);
      }

      .nav-utils {
        display: flex;
        align-items: center;
        gap: 0;
        border-left: 1px solid var(--border);
        padding-left: 1.5rem;
        margin-left: 1.5rem;
      }
      .nav-lang-group {
        display: flex;
      }
      .nav-btn {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.68rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        background: transparent;
        border: none;
        color: var(--fg-muted);
        padding: 0.3rem 0.55rem;
        cursor: pointer;
        transition: color 0.2s;
      }
      .nav-btn:hover,
      .nav-btn.active {
        color: var(--accent);
      }
      .nav-btn.active {
        font-weight: 500;
      }
      .nav-divider {
        width: 1px;
        height: 18px;
        background: var(--border);
        margin: 0 0.75rem;
      }
      .nav-theme-btn {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.68rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--fg-muted);
        padding: 0.3rem 0.75rem;
        border-radius: 2px;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }
      /* ── Mobile drawer ── */
      .hamburger {
        display: none;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--fg-muted);
        padding: 0.35rem 0.6rem;
        border-radius: 2px;
        cursor: pointer;
        font-size: 1rem;
        line-height: 1;
        transition: all 0.2s;
      }
      .hamburger:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .drawer-overlay {
        position: fixed;
        inset: 0;
        z-index: 200;
        background: oklch(0% 0 0 / 0.55);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }
      .drawer-overlay.open {
        opacity: 1;
        pointer-events: all;
      }
      .drawer {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 201;
        width: 280px;
        background: var(--bg-muted);
        border-right: 1px solid var(--border);
        transform: translateX(-100%);
        transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        padding: 2rem 1.75rem;
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }
      .drawer.open {
        transform: translateX(0);
      }
      .drawer-logo {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 800;
        font-size: 1.1rem;
        color: var(--accent);
        letter-spacing: -0.02em;
      }
      .drawer-nav {
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .drawer-nav a {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.78rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--fg-muted);
        text-decoration: none;
        padding: 0.85rem 0;
        border-bottom: 1px solid var(--border);
        transition: color 0.2s;
      }
      .drawer-nav a:first-child {
        border-top: 1px solid var(--border);
      }
      .drawer-nav a:hover {
        color: var(--accent);
      }
      .drawer-utils {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-top: auto;
      }
      .drawer-utils-label {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.62rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--fg-muted);
        margin-bottom: 0.25rem;
      }
      .drawer-btn-row {
        display: flex;
        gap: 0.5rem;
      }

      /* ── Hero ── */
      .hero {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding-bottom: 5rem;
        padding-top: 8rem;
        position: relative;
      }
      .hero-eyebrow {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 2rem;
      }
      .hero-name {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 800;
        font-size: clamp(4rem, 11vw, 10rem);
        line-height: 0.92;
        letter-spacing: -0.03em;
        color: var(--fg);
      }
      .hero-name .accent {
        color: var(--accent);
      }
      .hero-cursor {
        display: inline-block;
        width: 0.08em;
        height: 0.85em;
        background: var(--accent);
        margin-left: 0.05em;
        vertical-align: middle;
        animation: blink 1.1s step-end infinite;
      }
      .hero-bottom {
        margin-top: 4rem;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 2rem;
      }
      .hero-desc {
        font-size: 1.05rem;
        line-height: 1.65;
        color: var(--fg-muted);
        max-width: 38ch;
      }
      .hero-ctas {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }

      /* ── Buttons ── */
      .btn {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 0.75rem 1.5rem;
        border-radius: 2px;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.2s;
        cursor: pointer;
        border: none;
      }
      .btn-primary {
        background: var(--accent);
        color: oklch(12% 0.025 245);
        font-weight: 500;
      }
      .btn-primary:hover {
        filter: brightness(1.1);
        transform: translateY(-1px);
      }
      .btn-outline {
        background: transparent;
        color: var(--fg);
        border: 1px solid var(--border-strong);
      }
      .btn-outline:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ── Ticker ── */
      .ticker-wrap {
        overflow: hidden;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        padding: 0.75rem 0;
      }
      .ticker-track {
        display: flex;
        gap: 3rem;
        width: max-content;
        animation: ticker 30s linear infinite;
      }
      .ticker-item {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.7rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--fg-muted);
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .ticker-dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--accent);
        flex-shrink: 0;
      }

      /* ── Section header ── */
      .section-header {
        margin-bottom: 4rem;
      }
      .section-header.alt {
        text-align: right;
      }
      .section-title {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 800;
        font-size: clamp(2rem, 4vw, 3.2rem);
        letter-spacing: -0.03em;
        line-height: 1.05;
        margin-top: 0.75rem;
      }

      /* ── About ── */
      .about-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6rem;
        align-items: start;
      }
      .about-grid.alt {
        direction: rtl;
      }
      .about-grid.alt > * {
        direction: ltr;
      }
      .about-text p {
        font-size: 1.05rem;
        line-height: 1.75;
        color: var(--fg-muted);
        margin-bottom: 1.25rem;
      }
      .about-text p strong {
        color: var(--fg);
        font-weight: 500;
      }
      .stats-col {
        display: flex;
        flex-direction: column;
      }
      .stat-row {
        display: flex;
        align-items: baseline;
        gap: 1.5rem;
        padding: 1.75rem 0;
        border-bottom: 1px solid var(--border);
      }
      .stat-row:first-child {
        border-top: 1px solid var(--border);
      }
      .stat-number {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 800;
        font-size: 3.5rem;
        line-height: 1;
        color: var(--accent);
        letter-spacing: -0.04em;
        min-width: 5rem;
      }
      .stat-label {
        font-size: 0.9rem;
        color: var(--fg-muted);
        line-height: 1.4;
      }

      /* ── Skills ── */
      .skills-section {
        background: var(--bg-muted);
      }
      .skills-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0;
      }
      .skill-category {
        padding: 2.5rem;
        border-right: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
      }
      .skill-category:nth-child(2n) {
        border-right: none;
      }
      .skill-category:nth-child(n + 3) {
        border-bottom: none;
      }
      .skill-cat-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1.25rem;
      }
      .skill-cat-icon {
        color: var(--accent);
        font-size: 1rem;
      }
      .skill-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .pill {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.7rem;
        padding: 0.3rem 0.65rem;
        border-radius: 2px;
        border: 1px solid var(--border);
        color: var(--fg-muted);
        transition: all 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
      }
      .pill:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .pill img {
        width: 12px;
        height: 12px;
        object-fit: contain;
        filter: var(--icon-filter);
        flex-shrink: 0;
      }
      .pill:hover img {
        filter: none;
      }

      /* ── Projects ── */
      .project-list {
        display: flex;
        flex-direction: column;
      }
      .project-item {
        display: grid;
        grid-template-columns: 3.5rem 1fr auto;
        align-items: start;
        gap: 2rem;
        padding: 2.5rem 0;
        border-bottom: 1px solid var(--border);
        cursor: default;
      }
      .project-item:first-child {
        border-top: 1px solid var(--border);
      }
      .project-item:hover .project-num {
        color: var(--accent);
      }
      .project-item:hover .project-title {
        color: var(--accent);
      }
      .project-item:hover .project-arrow {
        transform: translate(3px, -3px);
        opacity: 1;
      }
      .project-num {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.72rem;
        color: var(--fg-muted);
        padding-top: 0.25rem;
        transition: color 0.2s;
        letter-spacing: 0.05em;
      }
      .project-title {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 700;
        font-size: 1.4rem;
        line-height: 1.2;
        margin-bottom: 0.5rem;
        transition: color 0.2s;
      }
      .project-desc {
        font-size: 0.92rem;
        color: var(--fg-muted);
        line-height: 1.6;
        max-width: 55ch;
        margin-bottom: 1rem;
      }
      .project-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }
      .project-tag {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.65rem;
        letter-spacing: 0.06em;
        color: var(--fg-muted);
        padding: 0.2rem 0.6rem;
        border: 1px solid var(--border);
        border-radius: 2px;
      }
      .project-arrow {
        font-size: 1.2rem;
        color: var(--accent);
        opacity: 0;
        transition: all 0.2s;
        align-self: center;
      }
      .project-links {
        display: flex;
        gap: 0.75rem;
        margin-top: 1rem;
        align-items: center;
      }
      .project-link {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.68rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        transition: all 0.18s;
      }
      .project-link-primary {
        background: var(--accent);
        color: oklch(12% 0.025 245);
        padding: 0.35rem 0.9rem;
        border-radius: 2px;
        font-weight: 500;
      }
      .project-link-primary:hover {
        filter: brightness(1.1);
      }
      .project-link-secondary {
        color: var(--fg-muted);
        border-bottom: 1px solid var(--border);
        padding-bottom: 1px;
      }
      .project-link-secondary:hover {
        color: var(--fg);
        border-color: var(--fg-muted);
      }

      /* ── Certifications ── */
      .cert-list {
        display: flex;
        flex-direction: column;
      }
      .cert-item {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 1.75rem;
        padding: 1.75rem 0;
        border-bottom: 1px solid var(--border);
      }
      .cert-item:first-child {
        border-top: 1px solid var(--border);
      }
      .cert-logo {
        width: 40px;
        height: 40px;
        border: 1px solid var(--border);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-muted);
        flex-shrink: 0;
        overflow: hidden;
      }
      .cert-logo img {
        width: 24px;
        height: 24px;
        object-fit: contain;
        filter: var(--icon-filter);
      }
      .cert-name {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 600;
        font-size: 1rem;
        margin-bottom: 0.25rem;
      }
      .cert-meta {
        display: flex;
        gap: 1rem;
        align-items: center;
        flex-wrap: wrap;
      }
      .cert-issuer {
        font-size: 0.85rem;
        color: var(--fg-muted);
      }
      .cert-badge {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.62rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 0.15rem 0.55rem;
        border-radius: 2px;
        border: 1px solid var(--accent);
        color: var(--accent);
      }
      .cert-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.5rem;
      }
      .cert-year {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.72rem;
        color: var(--fg-muted);
      }
      .cert-verify {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.65rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--fg-muted);
        text-decoration: none;
        border-bottom: 1px solid var(--border);
        padding-bottom: 1px;
        transition: all 0.15s;
      }
      .cert-verify:hover {
        color: var(--accent);
        border-color: var(--accent);
      }

      function useScrollReveal() {
        useEffect(() => {
          const els = document.querySelectorAll("[data-reveal]");
          if (!els.length) return;
          const io = new IntersectionObserver(
            (entries) =>
              entries.forEach((e) => {
                if (e.isIntersecting) {
                  e.target.classList.add("is-visible");
                  io.unobserve(e.target);
                }
              }),
            { threshold: 0.12 },
          );
          els.forEach((el) => io.observe(el));
          return () => io.disconnect();
        }, []);
      }

            <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z" />
          </svg>
        ),
        LinkedIn: (
          <svg
            viewBox="0 0 24 24"
            style={{
              width: 15,
              height: 15,
              fill: "currentColor",
              flexShrink: 0,
              opacity: 0.5,
              transition: "opacity 0.2s",
            }}
          >
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />

        Email: (
          <svg
            viewBox="0 0 24 24"
            style={{
              width: 15,
              height: 15,
              fill: "currentColor",
              flexShrink: 0,
              opacity: 0.5,
              transition: "opacity 0.2s",

            <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" />

        "Twitter / X": (
          <svg
            viewBox="0 0 24 24"

      };

      /* ── Contact ── */
      function Contact({ t }) {
        const hrefs = [
          "https://github.com",
          "https://linkedin.com",
          "mailto:your@email.com",
          "https://twitter.com",
        ];
        const baseLabels = ["GitHub", "LinkedIn", "Email", "Twitter / X"];
        return (
          <section id="contact" className="section">
            <div className="container">
              <div className="section-header" data-reveal>
                <span className="label">{t.s05}</span>
              </div>
              <h2 className="contact-big" data-reveal data-reveal-delay="1">
                {t.letsBuild}
              </h2>
              <div className="contact-links" data-reveal data-reveal-delay="2">
                {t.contactLinks.map((label, i) => (
                  <a
                    key={label}
                    href={hrefs[i]}
                    className="btn btn-contact"
                    target={
                      hrefs[i].startsWith("mailto") ? undefined : "_blank"
                    }
                    rel="noopener noreferrer"
                  >
                    {CONTACT_ICONS[baseLabels[i]]}
                    {label}
                  </a>
                ))}
              </div>
            </div>
          </section>
        );
      }

      /* ── Footer ── */
      function Footer({ t }) {
        return (
          <footer className="footer">
            <div className="container footer-inner">
              <span className="label">
                © {new Date().getFullYear()} Your Name
              </span>
              <span className="label">{t.footer}</span>
            </div>
          </footer>
        );
      }

      /* ── Root App ── */
      const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/ {
        accent: "orange",
        theme: "dark",
        lang: "en",
        altLayout: false,
      }; /*EDITMODE-END*/

      function App() {
        const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
        const t = T[tweaks.lang] || T.en;

        useScrollReveal();

        useEffect(() => {
          const map = {
            orange: "oklch(70% 0.19 52)",
            blue: "oklch(65% 0.18 240)",
            green: "oklch(68% 0.18 145)",
          };
          document.documentElement.style.setProperty(
            "--accent",
            map[tweaks.accent] || map.orange,
          );
        }, [tweaks.accent]);

        useEffect(() => {
          document.documentElement.classList.toggle(
            "light",
            tweaks.theme === "light",
          );
        }, [tweaks.theme]);

        useEffect(() => {
          document.documentElement.lang = tweaks.lang || "en";
        }, [tweaks.lang]);

        const toggleTheme = () =>
          setTweak("theme", tweaks.theme === "dark" ? "light" : "dark");
        const alt = tweaks.altLayout;

        return (
          <>
            <Navbar
              t={t}
              theme={tweaks.theme}
              onToggleTheme={toggleTheme}
              lang={tweaks.lang}
              onLangChange={(v) => setTweak("lang", v)}
            />
            <Hero t={t} />
            <Ticker />
            <About t={t} alt={false} />
            <Skills t={t} alt={alt} />
            <Certifications t={t} alt={false} />
            <Projects t={t} alt={alt} />
            <Contact t={t} />
            <Footer t={t} />
            <TweaksPanel>
              <TweakSection label="Accent Color">
                <TweakRadio
                  id="accent"
                  value={tweaks.accent}
                  onChange={(v) => setTweak("accent", v)}
                  options={[
                    { value: "orange", label: "Orange" },
                    { value: "blue", label: "Blue" },
                    { value: "green", label: "Green" },
                  ]}
                />
              </TweakSection>
              <TweakSection label="Theme">
                <TweakRadio
                  id="theme"
                  value={tweaks.theme}
                  onChange={(v) => setTweak("theme", v)}
                  options={[
                    { value: "dark", label: "Dark" },
                    { value: "light", label: "Light" },
                  ]}
                />
              </TweakSection>
              <TweakSection label="Language">
                <TweakRadio
                  id="lang"
                  value={tweaks.lang}
                  onChange={(v) => setTweak("lang", v)}
                  options={[
                    { value: "en", label: "English" },
                    { value: "it", label: "Italiano" },
                  ]}
                />
              </TweakSection>
              <TweakSection label="Alternating Layout">
                <TweakToggle
                  id="altLayout"
                  label="Flip even sections right"
                  value={tweaks.altLayout}
                  onChange={(v) => setTweak("altLayout", v)}
                />
              </TweakSection>
            </TweaksPanel>
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
